<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Gallery</title>
<link rel="icon" type="image/jpeg" href="https://i.ibb.co/PGT906Kx/IMG-7116.jpg">
<style>
  body { font-family: Arial,sans-serif; background-color:#111; color:#fff; text-align:center; padding:20px; }
  #catCount { position:fixed; top:10px; left:10px; font-size:16px; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:8px; z-index:1000; }
  h1,h2 { margin-bottom:10px; }
  .gallery { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:20px; }
  .cat-container { display:flex; flex-direction:column; align-items:center; max-width:220px; background:rgba(255,255,255,0.05); padding:5px; border-radius:12px; transition:transform 0.2s; }
  .cat-container:hover { transform:translateY(-4px); }
  .cat-image { width:100%; height:150px; object-fit:cover; border-radius:12px; border:2px solid #555; cursor:pointer; transition:transform 0.2s, border-color 0.2s; }
  .cat-image:hover { transform:scale(1.05); border-color:#fff; }
  .timestamp,.username { margin-top:3px; font-size:12px; color:#ccc; word-break:break-word; }
  #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column; z-index:1000; }
  #modal img { max-width:90%; max-height:80%; border-radius:10px; }
  #modal button { margin-top:15px; padding:10px 20px; font-size:16px; border-radius:5px; border:none; cursor:pointer; background-color:#fff; color:#000; }
  input[type="text"] { padding:6px; margin-right:5px; border-radius:5px; border:1px solid #555; background:#222; color:#fff; }
</style>
</head>
<body>

<div id="catCount">Total Cats: 0</div>

<h1>Upload Your Cats!</h1>
<input type="text" id="username" placeholder="Enter your username">
<input type="file" id="catFiles" accept="image/*" multiple>
<button id="uploadBtn">Upload</button>
<p id="status"></p>

<h2>Gallery</h2>
<div id="gallery" class="gallery"></div>

<div id="modal">
  <img id="modalImage" src="">
  <a id="downloadBtn" href="" download><button>Download</button></a>
  <button id="closeModal">Close</button>
</div>

<script>
const API_URL = "https://project-8fhoj.vercel.app/api/upload";

const uploadBtn = document.getElementById("uploadBtn");
const catFilesInput = document.getElementById("catFiles");
const usernameInput = document.getElementById("username");
const status = document.getElementById("status");
const gallery = document.getElementById("gallery");
const catCount = document.getElementById("catCount");
const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const downloadBtn = document.getElementById("downloadBtn");
const closeModal = document.getElementById("closeModal");

let catUrls = [];

async function getGallery() {
  try {
    const res = await fetch(API_URL, { method: "GET" });
    let data;
    try { data = await res.json(); } catch(e){ data = { catUrls: [] }; }
    catUrls = data.catUrls || [];
    catUrls.sort((a,b)=> new Date(b.time)-new Date(a.time));
    gallery.innerHTML = "";
    catUrls.forEach(item => addCatToGallery(item.url, item.time, item.username || "Anonymous"));
    catCount.textContent = `Total Cats: ${catUrls.length}`;
  } catch(err) {
    console.error(err);
    status.textContent = "Could not load gallery.";
  }
}

function addCatToGallery(url, time, username) {
  const container = document.createElement("div");
  container.className = "cat-container";

  const img = document.createElement("img");
  img.src = url;
  img.className = "cat-image";
  img.loading = "lazy";
  img.addEventListener("click", () => {
    modalImage.src = url;
    downloadBtn.href = url;
    modal.style.display = "flex";
  });

  const userDiv = document.createElement("div");
  userDiv.className = "username";
  userDiv.textContent = username;

  const tsDiv = document.createElement("div");
  tsDiv.className = "timestamp";
  tsDiv.textContent = new Date(time).toLocaleString();

  container.appendChild(img);
  container.appendChild(userDiv);
  container.appendChild(tsDiv);
  gallery.appendChild(container);
}

uploadBtn.addEventListener("click", async () => {
  const files = Array.from(catFilesInput.files);
  if (!files.length) return alert("Select at least one file!");
  const username = usernameInput.value.trim() || "Anonymous";
  status.textContent = "Uploading...";

  try {
    for (const file of files) {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const res = await fetch(API_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: file.name, type: file.type, fileBase64: base64, username })
      });

      const data = await res.json();
      if (!data.url) throw new Error("Upload failed");

      const time = new Date().toISOString();
      catUrls.unshift({ url: data.url, time, username });
    }

    await getGallery();
    status.textContent = "Upload complete!";
  } catch(err) {
    console.error(err);
    status.textContent = "Upload failed!";
  }
});

closeModal.addEventListener("click", () => {
  modal.style.display = "none";
});

getGallery();
</script>

</body>
</html>
